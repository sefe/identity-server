<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Identity Server Admin</title>
    <base href="/" />
    <link id="bootstrapcss" rel="stylesheet" href="css/bootstrap/bootstrap.min.css?v=1.0.0.0" />
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="IdentityServer.AdminPortal.Server.styles.css?v=1.0.0.0" />
    <link rel="stylesheet" href="css/app.css?v=1.0.0.0" />
    <link rel="icon" type="image/png" href="favicon.png?v=1.0.0.0" />
</head>

<body id="body">
    <script>
        (function () {
            document.getElementById("body").setAttribute('class', 'k-body')
        })();
    </script>
    <script src="js/bootstrap/bootstrap.bundle.min.js?v=1.0.0.0"></script>
    <script src="_content/Telerik.UI.for.Blazor/js/telerik-blazor.js?v=1.0.0.0"></script>
    <script>
        window.downloadFile = (fileName, contentType, content) => {
            const blob = new Blob([content], { type: contentType });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                document.body.removeChild(link);
            }, 100);
        };
    </script>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
