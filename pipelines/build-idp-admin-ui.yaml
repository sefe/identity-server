name: $(Build.DefinitionName).$(Build.SourceBranchName)_$(Date:yy).$(Date:MM).$(Date:dd)$(rev:.r)

pool:
  name: TRADING-DOTNET-03
  demands:
    - msbuild

trigger:
  branches:
    include:
      - main
      - releases/*
  paths:
    include:
      - 'src/IdentityServer.UI.Admin/**'
      - 'src/IdentityServer.Common/**'
    exclude:
      - '**/*.yaml'
      - '**/README.md'
  tags:
    include:
      - release/*

pr:
  branches:
    include:
      - feature/*

variables:
  - name: 'SourcePath'
    value: '$(Build.SourcesDirectory)/src/IdentityServer.UI.Admin'
  - name: 'WixSourcePath'
    value: '$(Build.SourcesDirectory)/src/IdentityServer.UI.Admin/IdentityServer.AdminPortal.Setup'
  - name: 'AdminUiTestPath'
    value: '$(Build.SourcesDirectory)/src/IdentityServer.UI.Admin/'
  - name: 'CommonTestPath'
    value: '$(Build.SourcesDirectory)/src/IdentityServer.Common'
  - template: build-variables.yaml

steps:
  - checkout: self
    fetchDepth: 0 # disable shallow clone to give SonarQube full blame info

  - task: NuGetToolInstaller@1
    displayName: 'Use NuGet 6.0.0'
    inputs:
      versionSpec: 6.0.0

  - task: NuGetCommand@2
    displayName: 'Nuget Restore'
    inputs:
      restoreSolution: '**/*.sln'
      feedsToUse: config
      nugetConfigPath: 'pipelines/NuGet.config'
      externalFeedCredentials: 'Nuget ProgetDV'
      noCache: true

  - task: PowerShell@2
    displayName: 'Calculate Assembly Version'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/pipelines/scripts/CalculateAssemblyVersion.ps1'
      arguments: '-BuildNumber "$(Build.BuildNumber)"'

  - task: PowerShell@2
    displayName: 'Update backend Assembly Version'
    inputs:
      filePath: '$(Build.SourcesDirectory)/pipelines/scripts/UpdateAssemblyVersion.ps1'
      arguments: '-assemblyInfoPath "$(Build.SourcesDirectory)/src/IdentityServer.UI.Admin/IdentityServer.AdminPortal.Server/Properties/AssemblyInfo.cs" -assemblyVersion "$(assemblyVersion)"'
      failOnStderr: true

  - task: PowerShell@2
    displayName: 'Update UI Assembly Version'
    inputs:
      filePath: '$(Build.SourcesDirectory)/pipelines/scripts/UpdateAssemblyVersion.ps1'
      arguments: '-assemblyInfoPath "$(Build.SourcesDirectory)/src/IdentityServer.UI.Admin/IdentityServer.AdminPortal.Web/Properties/AssemblyInfo.cs" -assemblyVersion "$(assemblyVersion)"'
      failOnStderr: true

  - task: PowerShell@2
    displayName: 'Update Index.html Version'
    inputs:
      filePath: '$(Build.SourcesDirectory)/pipelines/scripts/UpdateIndexVersion.ps1'
      arguments: '-filePath "$(Build.SourcesDirectory)/src/IdentityServer.UI.Admin/IdentityServer.AdminPortal.Web/wwwroot/index.html" -version "$(assemblyVersion)"'
      failOnStderr: true

  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: build
      projects: '$(SourcePath)/**/*.csproj'
    env:
      TELERIK_LICENSE: $(Telerik_License_Key)

  - task: DotNetCoreCLI@2
    displayName: Test
    inputs:
      command: test
      projects: |
        $(AdminUiTestPath)/IdentityServer.AdminPortal.Test/*.csproj
        $(AdminUiTestPath)/IdentityServer.AdminPortal.Web.Tests/*.csproj
        $(CommonTestPath)/IdentityServer.Data.Test/*.csproj
        $(CommonTestPath)/IdentityServer.OnePassword.Tests/*.csproj
        $(CommonTestPath)/IdentityServer.Abstraction.Tests/*.csproj
        $(CommonTestPath)/IdentityServer.MicrosoftGraph.Tests/*.csproj
        $(CommonTestPath)/IdentityServer.Core.Serilog.Test/*.csproj
      arguments: '--configuration $(BuildConfiguration) --collect "Code Coverage" --settings "$(Build.SourcesDirectory)/src/code_coverage.runsettings"'

  - task: DotNetCoreCLI@2
    displayName: Build MSI
    inputs:
      command: build
      projects: '$(WixSourcePath)/*.wixproj'
      arguments: '--configuration $(BuildConfiguration) --property AppVersion=$(assemblyVersion)'
    env:
      TELERIK_LICENSE: $(Telerik_License_Key)
    enabled: true

  - task: CopyFiles@2
    displayName: 'Copy Files to: $(Build.ArtifactStagingDirectory)'
    inputs:
      SourceFolder: '$(Build.SourcesDirectory)'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
    enabled: false

  - task: CopyFiles@2
    displayName: 'Copy installer files'
    inputs:
      SourceFolder: '$(SourcePath)'
      Contents: |
        **/bin/**/*msi.json
        **/bin/**/*.msi
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
      flattenFolders: true
    continueOnError: true
    enabled: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      publishLocation: FilePath
      TargetPath: '$(DropFolder)\$(Build.DefinitionName)\$(Build.BuildNumber)'
    condition: succeededOrFailed()
